<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Virtual | Colegio Naciones Unidas del Mundo</title>
  <link rel="stylesheet" href="https://vyrgyn33-cpu.github.io/proyecto-CNUM/vista/estilo/estilo.css" />
  <style>
    .campus-wrapper {
      min-height: calc(100vh - 72px);
      padding-top: 72px;
      background: var(--bordo-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .campus-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,168,76,0.04) 40px, rgba(201,168,76,0.04) 41px);
    }
    .campus-wrapper::after {
      content: '';
      position: absolute;
      right: -100px; top: -100px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(107,26,42,0.5), transparent 70%);
    }
    .login-box {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 3.5rem;
      width: 100%; max-width: 440px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }
    .login-logo {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .login-logo img {
      width: 80px; height: 80px;
      border-radius: 50%; object-fit: cover;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 6px rgba(201,168,76,0.1);
    }
    .login-logo h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 700;
      color: var(--white); text-align: center;
    }
    .login-logo .sub {
      font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--gold); text-align: center;
    }
    .login-divider { width: 40px; height: 2px; background: var(--gold); margin: 0 auto; }
    .login-form { display: flex; flex-direction: column; gap: 1.2rem; }
    .login-label {
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .login-label span {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.55);
    }
    .login-input {
      padding: 0.9rem 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem; color: var(--white);
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .login-input::placeholder { color: rgba(255,255,255,0.3); }
    .login-input:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.06);
    }
    .login-row {
      display: flex; justify-content: space-between; align-items: center;
    }
    .checkbox-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.82rem; color: rgba(255,255,255,0.5); cursor: pointer;
    }
    .checkbox-label input { accent-color: var(--gold); }
    .forgot-link { font-size: 0.82rem; color: var(--gold-light); transition: color 0.2s; }
    .forgot-link:hover { color: var(--gold); }
    .login-btn {
      padding: 1rem; background: var(--gold); color: var(--bordo-dark);
      font-family: 'Lato', sans-serif; font-size: 0.88rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 4px; cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(201,168,76,0.3);
      margin-top: 0.5rem;
    }
    .login-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(201,168,76,0.4); }
    .login-footer {
      margin-top: 2rem; text-align: center;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 1.5rem;
    }
    .login-footer a { font-size: 0.82rem; color: rgba(255,255,255,0.4); transition: color 0.2s; }
    .login-footer a:hover { color: var(--gold-light); }
    .tipo-acceso {
      display: flex; gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .tipo-btn {
      flex: 1; padding: 0.55rem; border: 1.5px solid rgba(255,255,255,0.12);
      background: transparent; color: rgba(255,255,255,0.45);
      font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .tipo-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
    .tipo-btn:hover:not(.active) { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">
      <img src="https://vyrgyn33-cpu.github.io/proyecto-CNUM/vista/multimedial/logoCnum.jpg" alt="Logo CNUM" />
      <div class="brand-text">
        <span class="nombre">Colegio Naciones Unidas del Mundo</span>
        <span class="slogan">Excelencia educativa</span>
      </div>
    </div>
    <ul class="navbar-links">
      <li><a href="../../index.html">Inicio</a></li>
      <li><a href="propuesta.html">Propuesta</a></li>
      <li><a href="niveles.html">Niveles</a></li>
      <li><a href="proyectos.html">Proyectos</a></li>
      <li><a href="novedades.html">Novedades</a></li>
      <li><a href="campus.html" class="active">Campus</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <div class="campus-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <img src="https://vyrgyn33-cpu.github.io/proyecto-CNUM/vista/multimedial/logoCnum.jpg" alt="Logo CNUM" />
        <h2>Campus Virtual</h2>
        <span class="sub">Colegio Naciones Unidas del Mundo</span>
        <div class="login-divider"></div>
      </div>

      <div class="tipo-acceso">
        <button class="tipo-btn active" onclick="setTipo(this)">Alumno</button>
        <button class="tipo-btn" onclick="setTipo(this)">Docente</button>
        <button class="tipo-btn" onclick="setTipo(this)">Familia</button>
      </div>

      <div class="login-form">
        <div class="login-label">
          <span>Usuario o correo electrónico</span>
          <input class="login-input" type="text" placeholder="usuario@num.edu.ar" />
        </div>
        <div class="login-label">
          <span>Contraseña</span>
          <input class="login-input" type="password" placeholder="••••••••" />
        </div>
        <div class="login-row">
          <label class="checkbox-label">
            <input type="checkbox" /> Recordarme
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>
        <button class="login-btn">Iniciar sesión</button>
      </div>

      <div class="login-footer">
        <a href="../../index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
    function setTipo(btn) {
      document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
